<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Galería de Tarot - Jesica Hardoy</title>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-512.jpg" />
    <link rel="icon" type="image/jpeg" href="/icon-512.jpg" />
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tarot Jesica" />

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registrado con éxito místico:', reg.scope))
            .catch(err => console.error('Fallo al registrar el Service Worker:', err));
        });
      }
    </script>
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased overflow-x-hidden selection:bg-purple-500/30 selection:text-purple-200">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
